spring.application.name=lms-service
spring.config.import=optional:configserver:http://localhost:8888

spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Local overrides when config-server is unavailable
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lms}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

jwt.secret=${JWT_SECRET:xebia-lms-jwt-secret-change-in-production-min-256-bits}
jwt.expiration-ms=86400000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
