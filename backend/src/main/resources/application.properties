spring.application.name=LMS_backend
server.port=${PORT:8082}

# Default active profile (dev uses in-memory H2 database, postgres uses PostgreSQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Default / Fallback Database Configuration (H2 In-Memory)
# Overridden when running with spring.profiles.active=postgres
spring.datasource.url=jdbc:h2:mem:lms;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

